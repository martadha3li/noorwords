<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>تطبيق العائلة</title>

<link rel="manifest" href="manifest.json">
<link rel="stylesheet" href="style.css">
<meta name="theme-color" content="#0f172a">
</head>

<body>

<header>
    <h2 id="todayDate"></h2>
    <p id="hijriDate"></p>
</header>

<div class="container">

    <!-- اختيار المدينة -->
    <div class="card" id="citySelectCard">
        <h3>اختر مدينتك</h3>
        <select id="citySelect">
            <option value="ahsa">الأحساء</option>
            <option value="dammam">الدمام</option>
            <option value="riyadh">الرياض</option>
        </select>
        <button onclick="saveCity()">حفظ</button>
    </div>

    <!-- أوقات الصلاة -->
    <div class="card">
        <h3>🕌 أوقات الصلاة</h3>
        <div id="prayerTimes"></div>
    </div>

    <!-- التعقيب -->
    <div class="card" id="taqibCard" style="display:none;">
        <h3>📖 التعقيب</h3>
        <p id="taqibText"></p>
    </div>

</div>

<nav>
    <button onclick="location.href='index.html'">الرئيسية</button>
    <button onclick="location.href='admin.html'">الإدارة</button>
</nav>

<script src="app.js"></script>
</body>
</html>
