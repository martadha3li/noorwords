<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>تطبيق نور الكلمات - المواقيت</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/moment.js/2.29.4/moment.min.js"></script>
</head>
<body>
    <div class="container">
        <div class="next-prayer-card">
            <h2 id="next-prayer-name">جاري الحساب...</h2>
            <div id="next-prayer-time">--:--</div>
            <p id="timer"></p>
        </div>

        <h3>جدول الشهر</h3>
        <div class="calendar-grid" id="calendarContainer">
            </div>

        <nav class="bottom-nav">
            <a href="index.html" class="active">المواقيت</a>
            <a href="duas.html">الأدعية</a>
            <a href="admin.html">الإدارة</a>
        </nav>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getFirestore, doc, getDoc, collection, getDocs, query, orderBy } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyD13--iO-zTtMSEwc78AK7G4MePSqoSRVM",
            authDomain: "nooewords.firebaseapp.com",
            projectId: "nooewords",
            storageBucket: "nooewords.firebasestorage.app",
            messagingSenderId: "649760440884",
            appId: "1:649760440884:web:636221321765ed94c00061"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        async function loadDashboard() {
            const offsetSnap = await getDoc(doc(db, "settings", "time_offsets"));
            const offsets = offsetSnap.data() || {fajr:0, dhuhr:0, maghrib:0};

            const q = query(collection(db, "prayer_schedule"), orderBy("timestamp"));
            const querySnapshot = await getDocs(q);
            const container = document.getElementById('calendarContainer');
            
            querySnapshot.forEach((docSnap) => {
                const d = docSnap.data();
                const adjust = (t, off) => moment(t, "HH:mm").add(off, 'm').format("HH:mm");

                container.innerHTML += `
                    <div class="prayer-card">
                        <div class="date">${docSnap.id}</div>
                        <div class="times">
                            <span>الفجر: ${adjust(d.fajr, offsets.fajr)}</span>
                            <span>الظهر: ${adjust(d.dhuhr, offsets.dhuhr)}</span>
                            <span>المغرب: ${adjust(d.maghrib, offsets.maghrib)}</span>
                        </div>
                    </div>
                `;
            });
        }
        loadDashboard();
    </script>
</body>
</html>
