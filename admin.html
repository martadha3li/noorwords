<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>لوحة الإدارة - رفع الأدعية</title>
    <style>
        body { font-family: sans-serif; padding: 20px; text-align: center; }
        .upload-section { border: 2px dashed #ccc; padding: 30px; border-radius: 10px; }
        button { background: #27ae60; color: white; border: none; padding: 10px 20px; cursor: pointer; border-radius: 5px; }
    </style>
</head>
<body>
    <h1>لوحة تحكم الأدعية</h1>
    <div class="upload-section">
        <p>اختر ملف .txt يحتوي على الأدعية (صيغة: اسم_الصلاة:الدعاء)</p>
        <input type="file" id="fileInput" accept=".txt">
        <br><br>
        <button id="uploadBtn">رفع ومعالجة البيانات</button>
    </div>
    <p id="status"></p>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getFirestore, doc, setDoc } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyD13--iO-zTtMSEwc78AK7G4MePSqoSRVM",
            authDomain: "nooewords.firebaseapp.com",
            projectId: "nooewords",
            storageBucket: "nooewords.firebasestorage.app",
            messagingSenderId: "649760440884",
            appId: "1:649760440884:web:636221321765ed94c00061"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        document.getElementById('uploadBtn').addEventListener('click', async () => {
            const fileInput = document.getElementById('fileInput');
            const status = document.getElementById('status');

            if (fileInput.files.length === 0) {
                alert("يرجى اختيار ملف أولاً");
                return;
            }

            const file = fileInput.files[0];
            const reader = new FileReader();

            reader.onload = async (e) => {
                const content = e.target.result;
                const lines = content.split('\n'); // تقسيم الملف لأسطر

                status.innerText = "جاري الرفع...";

                for (let line of lines) {
                    if (line.includes(':')) {
                        const [prayerId, duaText] = line.split(':');
                        
                        // إضافة أو تحديث الدعاء في Firestore
                        try {
                            await setDoc(doc(db, "duas", prayerId.trim()), {
                                text: duaText.trim(),
                                updatedAt: new Date()
                            });
                        } catch (err) {
                            console.error("خطأ في الرفع:", err);
                        }
                    }
                }
                status.innerText = "تم رفع جميع الأدعية بنجاح إلى قاعدة البيانات!";
            };

            reader.readAsText(file);
        });
    </script>
</body>
</html>
